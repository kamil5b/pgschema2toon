name: Build

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - goos: linux
                      goarch: amd64
                    - goos: linux
                      goarch: arm64
                    - goos: windows
                      goarch: amd64
                    - goos: windows
                      goarch: arm64
                    - goos: darwin
                      goarch: amd64
                    - goos: darwin
                      goarch: arm64

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v4
              with:
                  go-version: "1.26.0"

            - name: Build
              env:
                  CGO_ENABLED: 0
                  GOOS: ${{ matrix.goos }}
                  GOARCH: ${{ matrix.goarch }}
              run: |
                  BINARY_NAME="pgschema2toon"
                  if [ "${{ matrix.goos }}" = "windows" ]; then
                    BINARY_NAME="${BINARY_NAME}.exe"
                  fi
                  mkdir -p dist
                  go build -o dist/${BINARY_NAME} ./cmd/pg2toon

                  FINAL_NAME="${{ matrix.goarch }}-${{ matrix.goos }}-pgschema2toon"
                  if [ "${{ matrix.goos }}" = "windows" ]; then
                    FINAL_NAME="${FINAL_NAME}.exe"
                  fi
                  mv dist/${BINARY_NAME} dist/${FINAL_NAME}

            - name: Upload to Release
              uses: softprops/action-gh-release@v1
              with:
                  files: dist/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
